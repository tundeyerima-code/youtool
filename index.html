<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeLogic AI | Free YouTube Summary Tool & Video Librarian</title>
    <meta name="description" content="Extract transcripts and generate AI-powered insights instantly. The ultimate YouTube to SEO Blog and research tool.">
    <meta name="keywords" content="YouTube Transcript AI, Video Librarian, Free YouTube Summary Tool, YouTube to SEO Blog">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .accent-gradient { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans selection:bg-green-500/30">

    <header class="sticky top-0 z-50 glass border-b border-white/10 px-6 py-4">
        <nav class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tighter text-white">Tube<span class="text-green-500">Logic</span><span class="text-yellow-500">AI</span></a>
            <div class="space-x-8 hidden md:flex text-sm font-medium text-gray-400">
                <a href="index.html" class="hover:text-green-500 transition">Home</a>
                <a href="about.html" class="hover:text-green-500 transition">About</a>
                <a href="contact.html" class="hover:text-green-500 transition">Contact</a>
            </div>
        </nav>
    </header>

    <main class="flex-grow container mx-auto px-6 py-16 max-w-4xl">
        <section class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">
                The Video Librarian.
            </h1>
            <p class="text-gray-400 text-lg">Turn any YouTube video into structured research in seconds.</p>
        </section>

        <section class="glass p-8 rounded-3xl mb-12">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="youtubeUrl" placeholder="Paste YouTube URL here..." 
                    class="flex-grow bg-white/5 border border-white/10 rounded-xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-green-500 transition text-white">
                <button onclick="analyzeVideo()" class="accent-gradient hover:opacity-90 text-black font-bold px-8 py-4 rounded-xl transition shadow-lg shadow-green-500/20">
                    Analyze Video
                </button>
            </div>
        </section>

        <section id="resultsArea" class="hidden animate-in fade-in duration-700">
            <div class="bg-white text-black p-10 rounded-sm shadow-2xl leading-relaxed font-serif">
                <div class="flex justify-between items-start mb-8 border-b border-gray-200 pb-4">
                    <h2 class="text-2xl font-bold italic" id="resultTitle">Research Summary</h2>
                    <button onclick="copyToClipboard()" class="text-xs uppercase tracking-widest font-bold border border-black px-3 py-1 hover:bg-black hover:text-white transition">
                        Copy to Clipboard
                    </button>
                </div>
                <div id="aiOutput" class="space-y-4">
                    <p>Processing transcript and generating insights...</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="border-t border-white/10 py-10 text-center text-gray-500 text-sm">
        <p>&copy; 2026 TubeLogic AI. <a href="privacy.html" class="hover:underline">Privacy Policy</a></p>
    </footer>

    <script>
        async function analyzeVideo() {
            const url = document.getElementById('youtubeUrl').value;
            const resultsArea = document.getElementById('resultsArea');
            const aiOutput = document.getElementById('aiOutput');

            if (!url) return alert("Please enter a URL");

            resultsArea.classList.remove('hidden');
            aiOutput.innerHTML = "<p class='animate-pulse'>Accessing Gemini 1.5 Flash to summarize...</p>";

            try {
                // Placeholder for API Logic
                // To implement: 1. Extract Video ID, 2. Fetch Transcript via serverless proxy, 3. Send to Gemini
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=YOUR_API_KEY', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Summarize this transcript into high-level bullet points: [TRANSCRIPT_DATA]" }] }]
                    })
                });
                
                // Mock success for UI demo
                setTimeout(() => {
                    aiOutput.innerHTML = `
                        <ul class="list-disc pl-5 space-y-3">
                            <li><strong>Core Concept:</strong> High-level overview of the video's primary argument.</li>
                            <li><strong>Key Takeaway:</strong> Practical implementation details found in the middle segment.</li>
                            <li><strong>Conclusion:</strong> Final thoughts and SEO-optimized metadata suggestions.</li>
                        </ul>
                    `;
                }, 1500);

            } catch (error) {
                aiOutput.innerHTML = "Error connecting to AI service. Ensure API key is valid.";
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('aiOutput').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
