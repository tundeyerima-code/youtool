<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | TubeLogic AI Custom Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-black">
    <main class="container mx-auto px-6 py-20 max-w-xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold mb-2">Work With Us</h1>
            <p class="text-gray-400">Looking for custom AI tool development or marketing help?</p>
        </div>
        <form class="space-y-6 bg-white/5 p-8 rounded-2xl border border-white/10">
            <div>
                <label class="block text-sm font-medium mb-2">Name</label>
                <input type="text" class="w-full bg-black border border-white/20 rounded-lg px-4 py-3 focus:border-green-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Email</label>
                <input type="email" class="w-full bg-black border border-white/20 rounded-lg px-4 py-3 focus:border-green-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Project Type</label>
                <select class="w-full bg-black border border-white/20 rounded-lg px-4 py-3 focus:border-green-500 outline-none appearance-none">
                    <option>Marketing Help</option>
                    <option>Custom Tool Development</option>
                    <option>Bulk Content Processing</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-green-500 text-black font-bold py-4 rounded-lg hover:bg-yellow-500 transition duration-300">
                Send Request
            </button>
        </form>
        <div class="mt-8 text-center">
            <a href="index.html" class="text-gray-500 hover:text-white text-sm">← Back to Home</a>
        </div>
    </main>
</body>
</html>
